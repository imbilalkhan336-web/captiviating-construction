# ─────────────────────────────────────────────────────────────────────────────
# Static-asset cache headers for guardmyhvac.com (Ploi / nginx)
#
# WHY: Lighthouse "Use efficient cache lifetimes" — /img/*.webp and the
# Vite bundles under /build/assets/* are served with no Cache-Control header.
# nginx serves these files directly (they never hit PHP), so the headers must
# be set in the nginx server block, not in Laravel.
#
# HOW TO APPLY (one-time, on the server):
#   Ploi dashboard → your site → "Manage" → "Nginx Configuration"
#   Paste the two location blocks below INSIDE the existing `server { ... }`
#   block (above or below the default `location /`), then Save. Ploi reloads
#   nginx automatically. Do NOT add a `location /` here — Ploi already has one.
#
# VERIFY:
#   curl -sI https://guardmyhvac.com/img/logo.webp | grep -i cache-control
#   curl -sI https://guardmyhvac.com/build/assets/<any>.js | grep -i cache-control
# ─────────────────────────────────────────────────────────────────────────────

# Content-hashed Vite assets — the filename changes whenever the content does,
# so they can be cached forever and marked immutable.
location ^~ /build/ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    access_log off;
    try_files $uri =404;
}

# Static images and fonts (stable filenames) — long cache, NOT immutable so a
# replaced file (e.g. whychoose.webp) refreshes within a year / on cache clear.
location ~* \.(?:webp|avif|png|jpe?g|gif|svg|ico|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000";
    access_log off;
    try_files $uri =404;
}
